name: Deploy to fal.ai

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fal
        run: pip install fal

      - name: Deploy OmniTry to fal.ai
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          fal deploy app.py --app-name omnitry-app
